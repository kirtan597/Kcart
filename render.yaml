services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: kcart-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false          # set to https://kcart-client.onrender.com
      - key: ADMIN_URL
        sync: false          # set to https://kcart-admin.onrender.com

  # ── Client (Static Site) ─────────────────────────────────────
  - type: web
    name: kcart-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false          # set to https://kcart-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin (Static Site) ──────────────────────────────────────
  - type: web
    name: kcart-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false          # set to https://kcart-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
